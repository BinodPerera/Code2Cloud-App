name: CI/CD Pipeline Backend

on:
  push:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/code2cloud-backend:latest

      - name: Deploy to GCP Instance via SSH
        uses: appleboy/ssh-action@v1.0.3
        # 1. Map GitHub Secrets to the Runner's environment variables
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GITHUB_REDIRECT_URI: ${{ secrets.GH_REDIRECT_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.BACKEND_GCP_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_PRIVATE_KEY }}
          # 2. THE BRIDGE: Export these variables into the remote SSH session
          envs: GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET,GITHUB_REDIRECT_URI,SECRET_KEY,MONGODB_URL,DATABASE_NAME,DOCKERHUB_USER
          script: |
            # Pull the updated backend image
            docker pull $DOCKERHUB_USER/code2cloud-backend:latest
            
            # Stop and remove the old container if it exists
            docker stop code2cloud-backend || true
            docker rm code2cloud-backend || true
            
            # Run the new container, injecting the variables exported by 'envs'
            docker run -d \
              --name code2cloud-backend \
              -p 8000:8000 \
              -e GITHUB_CLIENT_ID="$GITHUB_CLIENT_ID" \
              -e GITHUB_CLIENT_SECRET="$GITHUB_CLIENT_SECRET" \
              -e GITHUB_REDIRECT_URI="$GITHUB_REDIRECT_URI" \
              -e SECRET_KEY="$SECRET_KEY" \
              -e MONGODB_URL="$MONGODB_URL" \
              -e DATABASE_NAME="$DATABASE_NAME" \
              --restart unless-stopped \
              $DOCKERHUB_USER/code2cloud-backend:latest