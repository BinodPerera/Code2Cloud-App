name: CI/CD Pipeline Backend

on:
  push:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # CHANGE: Point context to the backend folder
          context: ./backend 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/code2cloud-backend:latest

      - name: Deploy to GCP Instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_GCP_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_PRIVATE_KEY }}
          script: |
            # Pull the updated backend image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/code2cloud-backend:latest
            
            # Stop and remove the old container
            docker stop code2cloud-backend || true
            docker rm code2cloud-backend || true
            
            # Run the new container
            docker run -d \
              --name code2cloud-backend \
              -p 8000:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/code2cloud-backend:latest