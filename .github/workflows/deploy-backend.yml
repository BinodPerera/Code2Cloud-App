name: CI/CD Pipeline Backend

on:
  push:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/code2cloud-backend:latest

      - name: Deploy to GCP Instance via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GITHUB_REDIRECT_URI: ${{ secrets.GH_REDIRECT_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.BACKEND_GCP_INSTANCE_IP }}
          username: ubuntu 
          key: ${{ secrets.BACKEND_SSH_PRIVATE_KEY }}
          envs: GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET,GITHUB_REDIRECT_URI,SECRET_KEY,MONGODB_URL,DATABASE_NAME,DOCKERHUB_USER,FRONTEND_URL
          script: |
            # 1. Navigate to home directory
            cd ~ 

            # 2. Recreate the .env file
            cat <<EOF > .env
            GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET
            GITHUB_REDIRECT_URI=$GITHUB_REDIRECT_URI
            SECRET_KEY=$SECRET_KEY
            MONGODB_URL=$MONGODB_URL
            DATABASE_NAME=$DATABASE_NAME
            FRONTEND_URL=$FRONTEND_URL
            DOCKERHUB_USER=$DOCKERHUB_USER
            EOF

            # 3. Recreate docker-compose.yml (removed obsolete version tag)
            cat <<EOF > docker-compose.yml
            services:
              backend:
                image: $DOCKERHUB_USER/code2cloud-backend:latest
                container_name: code2cloud-backend
                ports:
                  - "8000:8000"
                env_file:
                  - .env
                restart: unless-stopped
            EOF

            # 4. Stop and remove current containers to avoid name conflicts
            # We explicitly remove 'code2cloud-backend' because the first time it was launched via 'docker run', so 'compose down' will ignore it.
            docker stop code2cloud-backend || true
            docker rm code2cloud-backend || true
            docker compose down

            # 5. Pull the latest image from Docker Hub
            docker compose pull backend

            # 6. Start the service in detached mode
            docker compose up -d --remove-orphans