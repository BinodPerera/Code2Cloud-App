name: CI/CD Pipeline Backend

on:
  push:
    branches: [ "master" ]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend 
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/code2cloud-backend:latest

      - name: Deploy to GCP Instance via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GITHUB_REDIRECT_URI: ${{ secrets.GH_REDIRECT_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.BACKEND_GCP_INSTANCE_IP }}
          username: ubuntu 
          key: ${{ secrets.BACKEND_SSH_PRIVATE_KEY }}
          envs: GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET,GITHUB_REDIRECT_URI,SECRET_KEY,MONGODB_URL,DATABASE_NAME,DOCKERHUB_USER,FRONTEND_URL
          script: |
            # 1. go to home directory
            cd ~ 

            # 2. create .env using github secrets
            cat <<EOF > .env
            GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET
            GITHUB_REDIRECT_URI=$GITHUB_REDIRECT_URI
            SECRET_KEY=$SECRET_KEY
            MONGODB_URL=$MONGODB_URL
            DATABASE_NAME=$DATABASE_NAME
            FRONTEND_URL=$FRONTEND_URL
            DOCKERHUB_USER=$DOCKERHUB_USER
            EOF

            # 3. pull latest image
            docker compose pull backend

            # 4. restart the container using docker compose
            # --remove-orphans will remove the old container
            docker compose up -d --remove-orphans