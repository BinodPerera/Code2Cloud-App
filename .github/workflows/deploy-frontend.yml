name: CI/CD Pipeline Frontend

on:
  push:
    branches: [ "master" ]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/code2cloud-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to GCP Instance via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.FRONTEND_GCP_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USER
          script: |
            # Pull the updated frontend image
            docker pull $DOCKERHUB_USER/code2cloud-frontend:latest
            
            # Stop and remove the old container
            docker stop code2cloud-frontend || true
            docker rm code2cloud-frontend || true
            
            # Run the new container
            docker run -d \
              --name code2cloud-frontend \
              -p 3000:80 \
              --restart unless-stopped \
              $DOCKERHUB_USER/code2cloud-frontend:latest
